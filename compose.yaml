services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: coupon_now
      POSTGRES_USER: coupon_now
      POSTGRES_PASSWORD: coupon_now
    ports:
      - "5432:5432"
    volumes:
      - coupon_now_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coupon_now -d coupon_now"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  coupon_now_postgres:

